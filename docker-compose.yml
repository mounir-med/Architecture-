version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: media
      POSTGRES_USER: media
      POSTGRES_PASSWORD: media
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./warehouse/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://media:media@postgres:5432/media
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    entrypoint: ["/bin/bash", "-c"]
    command: ["airflow db init && airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@example.com --password admin || true"]

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    depends_on:
      - airflow-init
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://media:media@postgres:5432/media
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./:/app
      - airflow_logs:/opt/airflow/logs
    command: ["airflow", "webserver"]

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://media:media@postgres:5432/media
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./:/app
      - airflow_logs:/opt/airflow/logs
    command: ["airflow", "scheduler"]

  superset:
    image: apache/superset:4.0.2
    depends_on:
      - postgres
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "change_me"
      SUPERSET_LOAD_EXAMPLES: "no"
      SUPERSET_ENV: production
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://media:media@postgres:5432/media
    volumes:
      - superset_home:/app/superset_home
    command: ["/bin/bash", "-c", "superset db upgrade && superset init && superset run -h 0.0.0.0 -p 8088"]

  scraper:
    build:
      context: .
      dockerfile: docker/scraper/Dockerfile
    depends_on:
      - kafka
      - minio
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      DATALAKE_BUCKET: media-datalake
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: media.articles
    volumes:
      - ./scrapers:/app/scrapers
      - ./ingestion:/app/ingestion
      - ./datalake:/app/datalake
      - ./etl:/app/etl
      - ./warehouse:/app/warehouse
    command: ["python", "-c", "print('scraper container ready')"]

volumes:
  minio_data:
  postgres_data:
  airflow_logs:
  superset_home:
